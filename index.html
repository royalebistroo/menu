
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoyaleBistro</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }
    </style>
</head>
<body>

<h1>Royale Bistro Nawabshah</h1>

<div class="gallery">
    <img src="RB1.jpeg" alt="Image 1">
    <img src="RB2.jpeg" alt="Image 2">
    <img src="RB3.jpeg" alt="Image 3">
    <img src="RB4.jpeg" alt="Image 4">
    <img src="RB5.jpeg" alt="Image 5">
    <img src="RB6.jpeg" alt="Image 6">
    <img src="RB7.jpeg" alt="Image 7">
    <img src="RB8.jpeg" alt="Image 8">
    <img src="RB9.jpeg" alt="Image 9">
    <img src="RB10.jpeg" alt="Image 10">
</div>

</body>
</html>
